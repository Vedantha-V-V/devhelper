<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ lab.title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="detail-page">
    <div class="background-glow"></div>
    <header class="topbar detail-topbar">
        <a class="back-link" href="{{ url_for('home') }}">← Back</a>
        <h1>{{ lab.title }}</h1>
        <p>File: {{ lab.file_name }}</p>
    </header>

    <main class="markdown-shell">
        <article class="markdown-body">
            {{ lab.html | safe }}
        </article>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script>
        hljs.highlightAll();
        
        // Add copy icon button to all code blocks
        document.querySelectorAll('pre').forEach(pre => {
            const codeBlock = pre.querySelector('code');
            if (codeBlock) {
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-icon-btn';
                copyBtn.title = 'Copy to clipboard';
                copyBtn.innerHTML = '<svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                
                copyBtn.addEventListener('click', () => {
                    const text = codeBlock.textContent;
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    }).catch(() => {
                        // Fallback if clipboard API fails
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    });
                });
                
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(copyBtn);
                wrapper.appendChild(pre);
            }
        });
    </script>
</body>
</html>
