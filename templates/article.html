<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ lab.title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="detail-page">
    <div class="app-shell">
        <header class="jenkins-header">
            <div class="brand-block">
                <div>
                    <p class="eyebrow">Lab details</p>
                    <h1>{{ lab.title }}</h1>
                </div>
            </div>
            <div class="header-actions">
                <a class="search-pill back-pill" href="{{ url_for('course_home', course=lab.course) }}">Back to {{ lab.course_label }}</a>
                <div class="user-pill">admin</div>
            </div>
        </header>

        <div class="workspace-shell detail-shell">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h2>Lab</h2>
                    <a class="sidebar-link active" href="{{ url_for('lab_detail', course=lab.course, lab_id=lab.id) }}">Overview</a>
                    <a class="sidebar-link" href="{{ url_for('course_home', course=lab.course) }}">All {{ lab.course_label }} labs</a>
                </div>
                <div class="sidebar-section">
                    <h2>Source</h2>
                    <div class="sidebar-stat">
                        <span>File</span>
                        <strong>{{ lab.file_name }}</strong>
                    </div>
                    <div class="sidebar-stat">
                        <span>Course</span>
                        <strong>{{ lab.course_label }}</strong>
                    </div>
                    <div class="sidebar-stat">
                        <span>Type</span>
                        <strong>Markdown</strong>
                    </div>
                </div>
            </aside>

            <main class="markdown-shell">
                <section class="panel detail-panel">
                    <div class="panel-heading detail-heading">
                        <div>
                            <p class="panel-kicker">Console output</p>
                            <h2>{{ lab.title }}</h2>
                        </div>
                        <span class="job-file">{{ lab.course_label }} / {{ lab.file_name }}</span>
                    </div>
                    <article class="markdown-body">
                        {{ lab.html | safe }}
                    </article>
                </section>
            </main>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script>
        hljs.highlightAll();
        
        // Add copy icon button to all code blocks
        document.querySelectorAll('pre').forEach(pre => {
            const codeBlock = pre.querySelector('code');
            if (codeBlock) {
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-icon-btn';
                copyBtn.title = 'Copy to clipboard';
                copyBtn.innerHTML = '<svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                
                copyBtn.addEventListener('click', () => {
                    const text = codeBlock.textContent;
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    }).catch(() => {
                        // Fallback if clipboard API fails
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    });
                });
                
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(copyBtn);
                wrapper.appendChild(pre);
            }
        });
    </script>
</body>
</html>
